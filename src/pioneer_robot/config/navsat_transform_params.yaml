navsat_transform:
  ros__parameters:
    frequency: 30.0
    delay: 3.0

    # Perth, WA magnetic declination ≈ +1.5° east = +0.026 rad
    # Check current value at: https://www.ngdc.noaa.gov/geomag/calculators/magcalc.shtml
    magnetic_declination_radians: 0.026

    # Offset between IMU yaw=0 and ENU east direction.
    # If IMU x-axis points forward (robot forward), set to 0.
    yaw_offset: 0.0

    zero_altitude: true
    broadcast_utm_transform: false
    publish_filtered_gps: true

    # Use odometry yaw for heading (IMU not available)
    use_odometry_yaw: true

    # Wait until GPS fix is valid before setting datum
    wait_for_datum: false

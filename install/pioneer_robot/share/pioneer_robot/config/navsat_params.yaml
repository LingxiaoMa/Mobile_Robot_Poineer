navsat_transform_node:
  ros__parameters:
    frequency: 10.0
    delay: 3.0
    # Perth, WA magnetic declination ~1.5 deg West = -0.026 rad
    magnetic_declination_radians: -0.026
    yaw_offset: 0.0
    zero_altitude: true
    broadcast_utm_transform: false
    publish_filtered_gps: false
    use_odometry_yaw: false
    # Use first GPS fix as origin automatically (no manual datum needed)
    wait_for_datum: false
